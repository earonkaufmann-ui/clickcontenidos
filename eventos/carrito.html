<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Fotos seleccionadas</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fill,150px);
gap:15px;
justify-content:center;
margin-top:40px;
}

.galeria img{
width:150px;
border-radius:8px;
}

button{
margin-top:30px;
padding:15px 25px;
font-size:16px;
cursor:pointer;
}

</style>

</head>
<link rel="stylesheet" href="../styles.css">

<header class="header">

<div class="logo">
<a href="/index.html">
<img src="/assets/logo.png" alt="Click Contenidos">
</a>
</div>

<nav>

<a href="/index.html">Inicio</a>

<a href="/eventos.html">Eventos</a>

<a href="/nosotros.html">Nosotros</a>

<a href="/index.html#contacto">Contacto</a>

</nav>

</header>

<body>

<h1>Fotos seleccionadas</h1>

<div class="foto-item">

<button class="btn-delete">🗑</button>

</div>

<div class="carrito-layout">

<div id="preview-fotos"></div>

<div class="resumen">

<p id="mensaje-descuento"></p>

<p>Fotos seleccionadas: <span id="cantidad"></span></p>
<p>Precio por foto: $<span id="precio"></span></p>

<p>Subtotal: $<span id="subtotal"></span></p>

<p id="linea-descuento">
Descuento: $<span id="descuento"></span></p>

<p class="total">
TOTAL: $<span id="total"></span></p>

<div class="acciones-carrito">

<button id="btn-volver">Seguir seleccionando fotos</button>

<button id="btn-vaciar">Vaciar carrito</button>

<button id="btn-solicitar">Solicitar fotos</button>
</div>
</div>
</div>

<!-- AGREGO SCRIPT DE CARRITO-->

 <script>
const contenedor = document.getElementById("preview-fotos");

let fotos = JSON.parse(localStorage.getItem("fotosSeleccionadas")) || [];

const precioFoto = 2000;
const descuentoCantidad = 5;
const descuentoPorcentaje = 0.15;

const rutaThumbs = "../assets/eventos/regatas-2026/thumbs/";

function renderCarrito(){

contenedor.innerHTML="";

fotos.forEach((nombre,index)=>{

const item=document.createElement("div");
item.className="item-carrito";

const img=document.createElement("img");
img.src=rutaThumbs+nombre;
img.className="mini-preview";

const btn=document.createElement("button");
btn.className="btn-eliminar-foto";
btn.innerHTML="✕";

btn.onclick=()=>{

fotos.splice(index,1);

localStorage.setItem(
"fotosSeleccionadas",
JSON.stringify(fotos)
);

renderCarrito();

};

item.appendChild(img);
item.appendChild(btn);

contenedor.appendChild(item);

});

calcularTotal();

}

function calcularTotal(){

const cantidad = fotos.length;

const subtotal = cantidad * precioFoto;

let descuento = 0;

const mensaje = document.getElementById("mensaje-descuento");

if(cantidad <= 4){

const faltan = 5 - cantidad;

mensaje.textContent =
"Te faltan " + faltan + " foto(s) para obtener 15% de descuento";
mensaje.className= "descuento-faltante";
}else{

mensaje.textContent = "¡Tenés aplicado el 15% de descuento! 🎉";

}

if(cantidad > descuentoCantidad){
descuento = subtotal * descuentoPorcentaje;
}

const total = subtotal - descuento;

document.getElementById("cantidad").textContent = cantidad;
document.getElementById("precio").textContent = precioFoto;
document.getElementById("subtotal").textContent = subtotal;
document.getElementById("total").textContent = total;

if(descuento > 0){

document.getElementById("linea-descuento").style.display = "block";
document.getElementById("descuento").textContent = descuento;

}else{

document.getElementById("linea-descuento").style.display = "none";

}



}

document.getElementById("btn-volver").onclick = ()=>{
window.history.back();
};

document.getElementById("btn-vaciar").onclick = ()=>{

if(!confirm("¿Vaciar todas las fotos seleccionadas?")) return;

fotos = [];

localStorage.removeItem("fotosSeleccionadas");

renderCarrito();

};

document.getElementById("btn-solicitar").onclick = ()=>{

if(fotos.length === 0){
alert("No hay fotos seleccionadas");
return;
}

const lista = fotos.join(", ");

const urlFormulario =
"https://docs.google.com/forms/d/e/1FAIpQLSc1RdEEKzXnmAmoNOdLWEMd82w47RauzhJN55g5CijHKbBRLA/viewform?usp=pp_url&entry.684656164=" 
+ encodeURIComponent(lista);

window.open(urlFormulario,"_blank");

};

renderCarrito();

</script> 

</body>
</html>
